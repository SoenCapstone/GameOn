name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
      - feat/ec2-deployment-pipeline
    paths:
      - "Backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend-deploy.yml"

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code on EC2
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 2m
          script: |
            cd /home/ec2-user/GameOn
            git pull origin main

      - name: Build and start containers on EC2
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 60m
          script: |
            cd /home/ec2-user/GameOn
            DOCKER_BUILDKIT=1 docker compose build
            docker compose up -d
            docker compose ps
